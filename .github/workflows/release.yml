name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            builder_args: --win --x64
          - name: windows-ia32
            os: windows-latest
            builder_args: --win --ia32
          - name: windows-arm64
            os: windows-latest
            builder_args: --win --arm64
          - name: macos-arm64
            os: macos-14
            builder_args: --mac --arm64
          - name: linux-x64
            os: ubuntu-latest
            builder_args: --linux --x64
          - name: linux-arm64
            os: ubuntu-latest
            builder_args: --linux --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux package tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${RELEASE_TAG}" != "v${VERSION}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match package.json version v${VERSION}."
            exit 1
          fi

      - name: Build renderer
        run: npm run build

      - name: Build Electron packages
        run: npx electron-builder ${{ matrix.builder_args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: polaragent-${{ matrix.name }}
          path: |
            release/**
            !release/**/*.blockmap
            !release/latest*.yml
            !release/builder-debug.yml
            !release/builder-effective-config.yaml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release notes
        shell: bash
        run: |
          NOTES_FILE="changelogs/${RELEASE_TAG}.md"
          if [[ ! -f "${NOTES_FILE}" ]]; then
            echo "::error::Missing release notes: ${NOTES_FILE}"
            exit 1
          fi
          cp "${NOTES_FILE}" "${RUNNER_TEMP}/release-notes.md"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: PolarAgent ${{ env.RELEASE_TAG }}
          body_path: ${{ runner.temp }}/release-notes.md
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: artifacts/**/*
