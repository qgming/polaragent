<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 320px;
  padding: 24px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #ffffff;
  color: #1a1a1a;
}

.header {
  text-align: center;
  margin-bottom: 24px;
}

.logo {
  width: 80px;
  height: 80px;
  margin: 0 auto 16px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

h1 {
  font-size: 20px;
  font-weight: 600;
  color: #1a1a1a;
  margin-bottom: 4px;
}

.version {
  font-size: 12px;
  color: #666;
  font-weight: 400;
}

.divider {
  height: 1px;
  background: #e5e5e5;
  margin: 20px 0;
}

.status-section {
  background: #f8f9fa;
  border-radius: 12px;
  padding: 16px;
}

.status-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-icon {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-icon.connected {
  background: #22c55e;
  box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
  animation: pulse-green 2s infinite;
}

.status-icon.disconnected {
  background: #ef4444;
  box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
}

@keyframes pulse-green {
  0%, 100% {
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
  }
  50% {
    box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.1);
  }
}

.status-content {
  flex: 1;
}

.status-label {
  font-size: 13px;
  color: #666;
  margin-bottom: 2px;
}

.status-text {
  font-size: 15px;
  font-weight: 500;
  color: #1a1a1a;
}

.status-detail {
  font-size: 12px;
  color: #999;
  margin-top: 8px;
  line-height: 1.5;
}

.footer {
  text-align: center;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid #e5e5e5;
}

.footer-text {
  font-size: 11px;
  color: #999;
}

.footer-link {
  color: #667eea;
  text-decoration: none;
  font-weight: 500;
}

.footer-link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <img src="icons/icon-128.png" alt="PolarAgent Logo">
  </div>
  <h1>PolarAgent</h1>
  <div class="version">Browser Use Extension</div>
</div>

<div class="divider"></div>

<div class="status-section">
  <div class="status-row">
    <div class="status-icon" id="statusIcon"></div>
    <div class="status-content">
      <div class="status-label">连接状态</div>
      <div class="status-text" id="statusText">检查中...</div>
    </div>
  </div>
  <div class="status-detail" id="statusDetail"></div>
</div>

<div class="footer">
  <div class="footer-text">
    Made with ❤️ by <a href="#" class="footer-link">PolarAgent</a>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
