<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  width: 340px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Roboto, Arial, sans-serif;
  background: #ffffff;
  color: #0b1220;
}

.shell {
  padding: 16px;
}

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 54px;
}

.logo {
  flex: 0 0 auto;
  width: 48px;
  height: 48px;
  border-radius: 14px;
  overflow: hidden;
}

.logo img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title-group {
  min-width: 0;
  flex: 1;
}

h1 {
  font-size: 20px;
  font-weight: 800;
  line-height: 1.2;
  letter-spacing: 0;
  color: #020817;
  white-space: nowrap;
}

.subtitle {
  margin-top: 3px;
  color: #64748b;
  font-size: 12px;
  line-height: 1.2;
}

.divider {
  height: 1px;
  margin: 14px -16px;
  background: #e5e7eb;
}

.stack {
  display: grid;
  gap: 10px;
}

.card {
  border-radius: 10px;
  background: #f7f7f8;
}

.status-card {
  display: grid;
  grid-template-columns: 12px 1fr auto auto;
  align-items: center;
  gap: 9px;
  min-height: 54px;
  padding: 12px;
}

.status-dot {
  width: 10px;
  height: 10px;
  border: 0;
  border-radius: 999px;
  background: #d1d5db;
}

.status-dot.connected {
  background: #22c55e;
  box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
}

.status-dot.warning {
  background: #f59e0b;
  box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.12);
}

.label {
  min-width: 0;
  font-size: 16px;
  font-weight: 800;
  line-height: 1.2;
  color: #020817;
}

.value {
  color: #475569;
  font-size: 15px;
  line-height: 1.2;
  text-align: right;
  white-space: nowrap;
}

.connect-button,
.save-button {
  border: 0;
  background: #050505;
  color: #ffffff;
  cursor: pointer;
  font-weight: 800;
  line-height: 1;
}

.connect-button {
  min-width: 58px;
  height: 38px;
  border-radius: 11px;
  font-size: 15px;
}

.connect-button.hidden {
  display: none;
}

.save-button {
  width: 56px;
  height: 34px;
  border-radius: 9px;
  font-size: 14px;
}

.connect-button:disabled,
.save-button:disabled {
  cursor: default;
  background: #9ca3af;
}

.port-card {
  padding: 12px;
}

.port-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}

.port-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.port-input {
  min-width: 0;
  flex: 1;
  height: 34px;
  border: 1px solid #e2e8f0;
  border-radius: 9px;
  padding: 0 10px;
  background: #ffffff;
  color: #0f172a;
  font-size: 14px;
  font-weight: 650;
  outline: none;
}

.port-input:focus {
  border-color: #94a3b8;
  box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.18);
}

.message {
  min-height: 16px;
  margin-top: 10px;
  color: #64748b;
  font-size: 12px;
  line-height: 1.35;
  word-break: break-all;
}
</style>
</head>
<body>
<main class="shell">
  <header class="header">
    <div class="logo">
      <img src="icons/icon-128.png" alt="PolarAgent Logo">
    </div>
    <div class="title-group">
      <h1>PolarAgent 连接器</h1>
      <div class="subtitle">Browser Use Extension</div>
    </div>
  </header>

  <div class="divider"></div>

  <section class="stack">
    <div class="card status-card">
      <div class="status-dot" id="statusIcon"></div>
      <div class="label">连接结果</div>
      <div class="value" id="statusText">检查中</div>
      <button class="connect-button" id="connectButton" type="button">连接</button>
    </div>

    <div class="card port-card">
      <div class="port-head">
        <div class="label">端口</div>
        <div class="value" id="portValue">18765</div>
      </div>
      <div class="port-row">
        <input class="port-input" id="portInput" type="number" min="1" max="65535" value="18765">
        <button class="save-button" id="portSave" type="button">保存</button>
      </div>
    </div>
  </section>

  <div class="message" id="portMessage"></div>
</main>

<script src="popup.js"></script>
</body>
</html>
