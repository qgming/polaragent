<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PPT Generator Export Deck</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --ink: #20242c;
      --muted: #667085;
      --line: #d8dde6;
      --accent: #0f766e;
      --accent-ink: #ffffff;
      --soft: #e4f4f0;
      --font: "Aptos", "Inter", "Segoe UI", "Microsoft YaHei UI", Arial, sans-serif;
      --heading: "Aptos Display", "Aptos", "Segoe UI", "Microsoft YaHei UI", Arial, sans-serif;
    }
    body[data-ppt-style="studio"] {
      --bg: #fbf7f0;
      --surface: #fffdf8;
      --ink: #1f2328;
      --muted: #725f51;
      --line: #e4d9cc;
      --accent: #8a1538;
      --soft: #f7e8ee;
      --heading: "Georgia", "Times New Roman", "Microsoft YaHei", serif;
    }
    body[data-ppt-style="data"] {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --ink: #172033;
      --muted: #607089;
      --line: #d7deea;
      --accent: #256d85;
      --soft: #e5f3f7;
    }
    body[data-ppt-style="pitch"] {
      --bg: #111827;
      --surface: #1f2937;
      --ink: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255,255,255,.16);
      --accent: #f2c94c;
      --accent-ink: #111827;
      --soft: rgba(242,201,76,.12);
    }
    body[data-ppt-style="magazine"] {
      --bg: #f4efe7;
      --surface: #fffaf2;
      --ink: #191816;
      --muted: #75695b;
      --line: #d8cab8;
      --accent: #b23b2e;
      --accent-ink: #fffaf2;
      --soft: #eadfce;
      --heading: "Georgia", "Times New Roman", "Microsoft YaHei", serif;
    }
    body[data-ppt-style="ink"] {
      --bg: #f6f1e8;
      --surface: #fffaf0;
      --ink: #1b1b18;
      --muted: #6f6a60;
      --line: #d2c6b6;
      --accent: #111111;
      --accent-ink: #f6f1e8;
      --soft: #e9dfcf;
      --heading: "Georgia", "Times New Roman", "Microsoft YaHei", serif;
    }
    body[data-ppt-style="kraft"] {
      --bg: #c9a574;
      --surface: #f1dfbd;
      --ink: #2a2118;
      --muted: #5f4b36;
      --line: rgba(42,33,24,.22);
      --accent: #24594f;
      --accent-ink: #f7efd9;
      --soft: rgba(255,255,255,.18);
      --heading: "Georgia", "Times New Roman", "Microsoft YaHei", serif;
    }
    body[data-ppt-style="porcelain"] {
      --bg: #f7f8f2;
      --surface: #ffffff;
      --ink: #17223b;
      --muted: #556274;
      --line: #d9dfeb;
      --accent: #1d4f91;
      --accent-ink: #ffffff;
      --soft: #e3edf8;
    }
    body[data-ppt-style="forest"] {
      --bg: #e9eee4;
      --surface: #f8faf4;
      --ink: #18271f;
      --muted: #526458;
      --line: #cdd8cc;
      --accent: #2f6b4f;
      --accent-ink: #ffffff;
      --soft: #d9e6d8;
      --heading: "Georgia", "Times New Roman", "Microsoft YaHei", serif;
    }
    body[data-ppt-style="swiss-blue"] {
      --bg: #f5f6f1;
      --surface: #ffffff;
      --ink: #0b0d12;
      --muted: #5f6673;
      --line: #d7dce2;
      --accent: #003cff;
      --accent-ink: #ffffff;
      --soft: rgba(0,60,255,.08);
    }
    body[data-ppt-style="lemon-grid"] {
      --bg: #f7f7ed;
      --surface: #fffff7;
      --ink: #161b16;
      --muted: #606a5e;
      --line: #dce2c8;
      --accent: #c7f000;
      --accent-ink: #121512;
      --soft: rgba(199,240,0,.18);
    }
    body[data-ppt-style="safety-orange"] {
      --bg: #151515;
      --surface: #242424;
      --ink: #fff8ef;
      --muted: #d9c8b7;
      --line: rgba(255,255,255,.18);
      --accent: #ff5a1f;
      --accent-ink: #ffffff;
      --soft: rgba(255,90,31,.14);
    }
    body[data-ppt-style="executive"] {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #cbd5e1;
      --accent: #1e3a5f;
      --accent-ink: #ffffff;
      --soft: #e8edf4;
    }
    body[data-ppt-style="academic"] {
      --bg: #fafafa;
      --surface: #ffffff;
      --ink: #1a1a1a;
      --muted: #666666;
      --line: #d0d0d0;
      --accent: #8b0000;
      --accent-ink: #ffffff;
      --soft: #f5e8e8;
      --heading: "Georgia", "Times New Roman", "Microsoft YaHei", serif;
    }
    body[data-ppt-style="minimal"] {
      --bg: #ffffff;
      --surface: #ffffff;
      --ink: #111111;
      --muted: #aaaaaa;
      --line: #eeeeee;
      --accent: #222222;
      --accent-ink: #ffffff;
      --soft: #f5f5f5;
      --heading: "Inter", "Helvetica Neue", "Arial", sans-serif;
    }
    body[data-ppt-style="modern"] {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --ink: #222222;
      --muted: #888888;
      --line: #e0ddd5;
      --accent: #4a4a4a;
      --accent-ink: #ffffff;
      --soft: #eae8e0;
    }
    body[data-ppt-style="classic"] {
      --bg: #f5f0e8;
      --surface: #faf6ee;
      --ink: #2c2416;
      --muted: #7a6e5e;
      --line: #d4c9b8;
      --accent: #8a6e45;
      --accent-ink: #faf6ee;
      --soft: #ede4d5;
      --heading: "Georgia", "Times New Roman", "Microsoft YaHei", serif;
    }
    body[data-ppt-style="tech"] {
      --bg: #0a0e17;
      --surface: #1a1f2e;
      --ink: #e2e8f0;
      --muted: #8899b0;
      --line: #2a3142;
      --accent: #6366f1;
      --accent-ink: #ffffff;
      --soft: rgba(99,102,241,.12);
    }
    body[data-ppt-style="vintage"] {
      --bg: #e8ddd0;
      --surface: #f5ede1;
      --ink: #2c2018;
      --muted: #8a7a6a;
      --line: #cbbaa8;
      --accent: #a0522d;
      --accent-ink: #ffffff;
      --soft: rgba(160,82,45,.12);
      --heading: "Georgia", "Times New Roman", "Microsoft YaHei", serif;
    }
    body[data-ppt-style="bold"] {
      --bg: #1a1a2e;
      --surface: #16213e;
      --ink: #f8f9fa;
      --muted: #a0a0b8;
      --line: rgba(255,255,255,.12);
      --accent: #ff006e;
      --accent-ink: #ffffff;
      --soft: rgba(255,0,110,.12);
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      letter-spacing: 0;
    }
    #deck {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .slide {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      padding: 70px 82px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 42px;
      overflow: hidden;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--soft) 65%, transparent), transparent 42%),
        var(--bg);
      opacity: 1;
    }
    .slide[data-export-active="false"] { opacity: 0; visibility: hidden; }
    h1, h2, h3, p { margin: 0; }
    h1, h2, h3 { font-family: var(--heading); line-height: 1.04; }
    h1 { font-size: 88px; max-width: 1120px; }
    h2 { font-size: 58px; max-width: 1120px; }
    h3 { font-size: 28px; }
    p { font-size: 24px; line-height: 1.45; color: var(--muted); }
    .chrome {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .kicker {
      color: var(--accent);
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .lead {
      margin-top: 28px;
      max-width: 900px;
      font-size: 30px;
    }
    .cover { grid-template-rows: auto 1fr auto; }
    .hero-copy { align-self: center; }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 48px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      padding-bottom: 24px;
    }
    .section-head p:last-child { max-width: 460px; text-align: right; }
    .grid { display: grid; gap: 28px; align-self: stretch; }
    .grid.three { grid-template-columns: repeat(3, 1fr); }
    .card, .panel, .metrics article, .timeline article {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 34px;
      min-width: 0;
    }
    .card span {
      display: block;
      color: var(--accent);
      font-weight: 900;
      margin-bottom: 32px;
    }
    .card p, .panel p, .timeline p { margin-top: 16px; }
    .statement {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .statement h2 { font-size: 78px; max-width: 1220px; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      align-self: start;
    }
    .metrics span, .metrics em {
      display: block;
      color: var(--muted);
      font-size: 18px;
      font-style: normal;
      text-transform: uppercase;
    }
    .metrics strong {
      display: block;
      font-size: 72px;
      line-height: 1;
      margin: 22px 0 12px;
    }
    .split {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      gap: 34px;
    }
    .panel { display: flex; flex-direction: column; justify-content: space-between; }
    .panel.accent {
      background: var(--accent);
      color: var(--accent-ink);
      border-color: var(--accent);
    }
    .panel.accent p, .panel.accent .kicker { color: color-mix(in srgb, var(--accent-ink) 80%, transparent); }
    .timeline {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
      align-self: center;
    }
    .timeline time {
      display: block;
      color: var(--accent);
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 28px;
    }
    body[data-ppt-style="magazine"] .slide,
    body[data-ppt-style="ink"] .slide,
    body[data-ppt-style="forest"] .slide {
      background:
        linear-gradient(90deg, transparent 0, transparent 76px, var(--line) 77px, transparent 78px),
        linear-gradient(135deg, color-mix(in srgb, var(--soft) 72%, transparent), transparent 48%),
        var(--bg);
    }
    body[data-ppt-style="magazine"] .section-head,
    body[data-ppt-style="ink"] .section-head {
      border-top: 3px solid var(--ink);
      border-bottom: 1px solid var(--line);
      padding-top: 22px;
    }
    body[data-ppt-style="kraft"] .slide {
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.18), transparent 28%),
        repeating-linear-gradient(0deg, rgba(42,33,24,.035) 0, rgba(42,33,24,.035) 1px, transparent 1px, transparent 7px),
        var(--bg);
    }
    body[data-ppt-style="porcelain"] .slide {
      background:
        radial-gradient(circle at 12% 18%, rgba(29,79,145,.11), transparent 26%),
        radial-gradient(circle at 86% 72%, rgba(29,79,145,.08), transparent 30%),
        var(--bg);
    }
    body[data-ppt-style="swiss-blue"] .slide,
    body[data-ppt-style="lemon-grid"] .slide {
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        var(--bg);
      background-size: 48px 48px;
    }
    body[data-ppt-style="swiss-blue"] .kicker,
    body[data-ppt-style="lemon-grid"] .kicker,
    body[data-ppt-style="safety-orange"] .kicker {
      display: inline-block;
      width: fit-content;
      background: var(--accent);
      color: var(--accent-ink);
      padding: 8px 12px;
      border-radius: 2px;
    }
    body[data-ppt-style="safety-orange"] .slide {
      background:
        repeating-linear-gradient(135deg, rgba(255,90,31,.18) 0, rgba(255,90,31,.18) 2px, transparent 2px, transparent 14px),
        var(--bg);
    }
    body[data-ppt-style="safety-orange"] .card,
    body[data-ppt-style="safety-orange"] .panel,
    body[data-ppt-style="safety-orange"] .metrics article,
    body[data-ppt-style="safety-orange"] .timeline article {
      box-shadow: 10px 10px 0 var(--accent);
    }

    /* ── 8 new classic PPT styles ── */
    body[data-ppt-style="executive"] .section-head {
      border-bottom: 2px solid var(--accent);
    }
    body[data-ppt-style="executive"] .card {
      border-left: 4px solid var(--accent);
      border-radius: 4px;
    }

    body[data-ppt-style="academic"] .slide {
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--soft) 55%, transparent), transparent 40%),
        var(--bg);
    }
    body[data-ppt-style="academic"] .kicker {
      display: inline-block;
      background: var(--accent);
      color: var(--accent-ink);
      padding: 4px 10px;
      border-radius: 2px;
    }

    body[data-ppt-style="minimal"] h1 { font-weight: 300; letter-spacing: -0.02em; }
    body[data-ppt-style="minimal"] h2 { font-weight: 400; letter-spacing: -0.01em; }
    body[data-ppt-style="minimal"] .kicker { font-weight: 600; letter-spacing: 0.08em; }
    body[data-ppt-style="minimal"] .card { border-radius: 2px; box-shadow: none; border-color: var(--line); }
    body[data-ppt-style="minimal"] .section-head { border-bottom: 0.5pt solid var(--line); }

    body[data-ppt-style="modern"] .section-head { border-bottom: 1px solid var(--line); }
    body[data-ppt-style="modern"] .card { border-radius: 4px; border-left: 3px solid var(--accent); }
    body[data-ppt-style="modern"] .kicker { letter-spacing: 0.04em; }

    body[data-ppt-style="classic"] .slide {
      background:
        radial-gradient(circle at 82% 18%, rgba(138,110,69,.06), transparent 32%),
        linear-gradient(135deg, color-mix(in srgb, var(--soft) 60%, transparent), transparent 42%),
        var(--bg);
    }
    body[data-ppt-style="classic"] .section-head {
      border-top: 2px solid var(--accent);
      border-bottom: 1px solid var(--line);
      padding-top: 20px;
    }
    body[data-ppt-style="classic"] .card { border-radius: 2px; border-top: 3px solid var(--accent); }

    body[data-ppt-style="tech"] .slide {
      background:
        repeating-linear-gradient(0deg, rgba(99,102,241,.04) 0, rgba(99,102,241,.04) 1px, transparent 1px, transparent 6px),
        var(--bg);
    }
    body[data-ppt-style="tech"] .kicker {
      display: inline-block;
      background: var(--accent);
      color: var(--accent-ink);
      padding: 4px 10px;
      border-radius: 4px;
    }
    body[data-ppt-style="tech"] .card { border-color: var(--line); }

    body[data-ppt-style="vintage"] .slide {
      background:
        radial-gradient(circle at 14% 86%, rgba(160,82,45,.08), transparent 24%),
        repeating-linear-gradient(45deg, rgba(160,82,45,.025) 0, rgba(160,82,45,.025) 2px, transparent 2px, transparent 12px),
        var(--bg);
    }
    body[data-ppt-style="vintage"] .card {
      border: 1px solid var(--line);
      box-shadow: 4px 4px 0 rgba(44,32,24,.08);
    }

    body[data-ppt-style="bold"] .slide {
      background:
        radial-gradient(circle at 8% 12%, rgba(255,0,110,.08), transparent 22%),
        radial-gradient(circle at 92% 88%, rgba(255,0,110,.06), transparent 26%),
        var(--bg);
    }
    body[data-ppt-style="bold"] .kicker {
      display: inline-block;
      background: var(--accent);
      color: var(--accent-ink);
      padding: 6px 14px;
      border-radius: 24px;
      font-size: 14px;
    }
    body[data-ppt-style="bold"] .card {
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(4px);
    }
    body[data-ppt-style="bold"] .section-head { border-bottom: 1px solid rgba(255,255,255,.08); }
  </style>
</head>
<body data-ppt-style="board">
  <main id="deck">
    <!-- SLIDES_HERE -->
  </main>
</body>
</html>
